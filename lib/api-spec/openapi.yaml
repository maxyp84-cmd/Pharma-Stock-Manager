openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Pharmacy Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: auth
  - name: products
  - name: categories
  - name: suppliers
  - name: branches
  - name: users
  - name: stock
  - name: sales
  - name: dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [auth]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
  /users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /branches:
    get:
      operationId: listBranches
      tags: [branches]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Branch"
    post:
      operationId: createBranch
      tags: [branches]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"
  /branches/{id}:
    patch:
      operationId: updateBranch
      tags: [branches]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"
    delete:
      operationId: deleteBranch
      tags: [branches]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
  /suppliers/{id}:
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /products:
    get:
      operationId: listProducts
      tags: [products]
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: barcode
          in: query
          required: false
          schema:
            type: string
        - name: branchId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /products/expiring:
    get:
      operationId: listExpiringProducts
      tags: [products]
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
  /products/low-stock:
    get:
      operationId: listLowStockProducts
      tags: [products]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
  /stock/movements:
    get:
      operationId: listStockMovements
      tags: [stock]
      parameters:
        - name: productId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"
    post:
      operationId: createStockMovement
      tags: [stock]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockMovementBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"
  /sales:
    get:
      operationId: listSales
      tags: [sales]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: from
          in: query
          required: false
          schema:
            type: string
        - name: to
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /dashboard/sales-trend:
    get:
      operationId: getSalesTrend
      tags: [dashboard]
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesTrendPoint"
  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]
    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]
    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
        branchId:
          type: integer
          nullable: true
        branchName:
          type: string
          nullable: true
      required: [id, username, fullName, role]
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
        branchId:
          type: integer
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
      required: [id, username, fullName, role, active, createdAt]
    CreateUserBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        fullName:
          type: string
        role:
          type: string
        branchId:
          type: integer
          nullable: true
      required: [username, password, fullName, role]
    UpdateUserBody:
      type: object
      properties:
        fullName:
          type: string
        role:
          type: string
        branchId:
          type: integer
          nullable: true
        active:
          type: boolean
        password:
          type: string
    Branch:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
      required: [id, name]
    CreateBranchBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
      required: [name]
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required: [id, name]
    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
      required: [name]
    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contactName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
      required: [id, name]
    CreateSupplierBody:
      type: object
      properties:
        name:
          type: string
        contactName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
      required: [name]
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        barcode:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
        categoryId:
          type: integer
          nullable: true
        categoryName:
          type: string
          nullable: true
        supplierId:
          type: integer
          nullable: true
        supplierName:
          type: string
          nullable: true
        branchId:
          type: integer
          nullable: true
        unit:
          type: string
          nullable: true
        costPrice:
          type: number
        sellPrice:
          type: number
        stockQty:
          type: integer
        reorderLevel:
          type: integer
        expiryDate:
          type: string
          nullable: true
        batchNumber:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
      required: [id, name, costPrice, sellPrice, stockQty, reorderLevel]
    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        barcode:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
        categoryId:
          type: integer
          nullable: true
        supplierId:
          type: integer
          nullable: true
        branchId:
          type: integer
          nullable: true
        unit:
          type: string
          nullable: true
        costPrice:
          type: number
        sellPrice:
          type: number
        stockQty:
          type: integer
        reorderLevel:
          type: integer
        expiryDate:
          type: string
          nullable: true
        batchNumber:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
      required: [name, costPrice, sellPrice, stockQty, reorderLevel]
    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        barcode:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
        categoryId:
          type: integer
          nullable: true
        supplierId:
          type: integer
          nullable: true
        branchId:
          type: integer
          nullable: true
        unit:
          type: string
          nullable: true
        costPrice:
          type: number
        sellPrice:
          type: number
        stockQty:
          type: integer
        reorderLevel:
          type: integer
        expiryDate:
          type: string
          nullable: true
        batchNumber:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
    StockMovement:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        type:
          type: string
        quantity:
          type: integer
        note:
          type: string
          nullable: true
        userId:
          type: integer
          nullable: true
        userName:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, productId, productName, type, quantity, createdAt]
    CreateStockMovementBody:
      type: object
      properties:
        productId:
          type: integer
        type:
          type: string
        quantity:
          type: integer
        note:
          type: string
          nullable: true
      required: [productId, type, quantity]
    SaleItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        costPrice:
          type: number
        lineTotal:
          type: number
      required: [id, productId, productName, quantity, unitPrice, costPrice, lineTotal]
    Sale:
      type: object
      properties:
        id:
          type: integer
        receiptNumber:
          type: string
        subtotal:
          type: number
        discount:
          type: number
        tax:
          type: number
        total:
          type: number
        profit:
          type: number
        paymentMethod:
          type: string
        amountPaid:
          type: number
        change:
          type: number
        cashierId:
          type: integer
          nullable: true
        cashierName:
          type: string
          nullable: true
        branchId:
          type: integer
          nullable: true
        branchName:
          type: string
          nullable: true
        customerName:
          type: string
          nullable: true
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
      required: [id, receiptNumber, subtotal, discount, tax, total, profit, paymentMethod, amountPaid, change, createdAt, items]
    CreateSaleItemBody:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        unitPrice:
          type: number
      required: [productId, quantity, unitPrice]
    CreateSaleBody:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateSaleItemBody"
        discount:
          type: number
        tax:
          type: number
        paymentMethod:
          type: string
        amountPaid:
          type: number
        customerName:
          type: string
          nullable: true
      required: [items, discount, tax, paymentMethod, amountPaid]
    DashboardSummary:
      type: object
      properties:
        salesToday:
          type: number
        salesWeek:
          type: number
        salesMonth:
          type: number
        profitToday:
          type: number
        profitMonth:
          type: number
        transactionsToday:
          type: integer
        productCount:
          type: integer
        lowStockCount:
          type: integer
        expiringSoonCount:
          type: integer
        totalStockValue:
          type: number
      required: [salesToday, salesWeek, salesMonth, profitToday, profitMonth, transactionsToday, productCount, lowStockCount, expiringSoonCount, totalStockValue]
    SalesTrendPoint:
      type: object
      properties:
        date:
          type: string
        sales:
          type: number
        profit:
          type: number
      required: [date, sales, profit]
    TopProduct:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantitySold:
          type: integer
        revenue:
          type: number
      required: [productId, productName, quantitySold, revenue]
